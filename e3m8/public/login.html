<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">Iniciar sesión</h4>

        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" class="form-control" id="username" placeholder="Tu nombre de usuario" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Tu contraseña" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Ingresar</button>
          </div>
        </form>

        <hr>

        <div class="d-grid">
          <button id="perfilBtn" class="btn btn-outline-secondary btn-sm">Ver Perfil (ruta protegida)</button>
        </div>

        <p id="mensaje" class="mt-3 text-center small" style="white-space: pre-line;"></p>

        <hr>
        <p class="text-center small mb-0">
          ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </p>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
